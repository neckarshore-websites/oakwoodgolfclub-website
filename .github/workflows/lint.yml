# Strict ESLint gate — fails the build on any warning OR error.
# Catches drift before it reaches main. Ported from rauhut-website
# PR #6 after the L-RH-CLAUDE-DRIFT-AUDIT cross-site sweep
# (Linus session 2026-05-19): oakwood had no Lint CI job at all, so
# any new warning or error would have slipped through main silently.
# This is the L-RH-LINT-OAK item, closing the L-RETRO-R3 oakwood leg.
#
# Security-note: this workflow uses ZERO untrusted github.event.* inputs.
# All run-steps are static literals. No command-injection surface.
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Read-only: static ESLint gate, no repo writes.
permissions:
  contents: read

jobs:
  lint:
    name: ESLint (strict, zero warnings)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint with strict gate
        run: npm run lint -- --max-warnings 0

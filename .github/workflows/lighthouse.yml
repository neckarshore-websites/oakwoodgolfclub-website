name: Lighthouse Audit

on:
  # Manual fallback — the scheduled cron has proven unreliable on low-traffic
  # repos (3 of 4 sites' Monday crons never fired on 2026-06-01). Lets us
  # trigger an on-demand Lighthouse run via `gh workflow run lighthouse.yml`.
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:45 UTC — staggered from neckarshore (06:00),
    # rauhut (06:15), and goldoni (06:30) per Bundle-A Plan-Doc 2026-05-21
    # § Work-Item 3 to avoid GitHub Actions parallel-quota.
    - cron: "45 6 * * 1"

# Read-only: this workflow only builds + audits; it never writes to the repo.
permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse (Desktop + Mobile)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # oakwood-website serves on port 3000 (default; see package.json `start`).
      LIGHTHOUSE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Profile regression test (no Chrome needed)
        run: npm run test:lighthouse:unit

      - name: Build production bundle
        run: npm run build

      - name: Start server
        run: npm run start &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf "$LIGHTHOUSE_URL" > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Run Lighthouse audit
        run: npm run lighthouse:quick

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-reports
          path: .lighthouse/
          retention-days: 14
          include-hidden-files: true

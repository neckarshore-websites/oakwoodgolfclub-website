name: Unit

# CI gate for the pure Node/tsx unit tests (Test Charter §4c — every existing
# suite must run in CI). Green locally but invoked by no workflow. Fast, no
# browser, no secrets — kept in their own lightweight job.
#
# Deliberately excluded: test:search:unit (currently RED — a real bug, tracked
# separately) and smoke:* (need SMTP secrets via .env.local — a later slice).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    name: Node unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: |
          npm run test:lighthouse:unit
          npm run test:blog:unit
          npm run test:seo:unit
          npm run test:sitemap:unit
          npm run test:export:unit
          npm run test:ai-surface:unit

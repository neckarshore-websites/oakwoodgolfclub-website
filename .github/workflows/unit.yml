name: Unit

# CI gate for the pure Node/tsx unit tests (Test Charter §4c — every existing
# suite must run in CI). Green locally but invoked by no workflow. Fast, no
# browser, no secrets — kept in their own lightweight job.
#
# Suite classification (2026-07-19, ungated-suites routing work order):
#
#   Class A (gated below):  test:search:unit, smoke:templates
#   Class C (NOT gated):    smoke:smtp, smoke:send — see justifications below
#
# CORRECTION — the previous note here read "test:search:unit (currently RED —
# a real bug, tracked separately)". That was stale on two counts: the suite was
# red because of a STALE FIXTURE, not a product bug (it asserted one hardcoded
# slug was absent from the index; that post was later published in dd2347a),
# and the prod draft filter in lib/blog/posts.ts was verified correct. The
# assertion is now invariant-based and the suite is green — so it is gated.
#
# smoke:smtp — Class C. Ungated: needs the six SMTP_* credentials, which are
#   NOT provisioned in this repo's Actions secrets (verified 2026-07-19: repo
#   secret list is empty; e2e.yml likewise records "no SMTP creds" in CI). It
#   connects + authenticates against the live IONOS mailbox and sends nothing.
#   It is a manual pre-launch validator: `npm run smoke:smtp` with a populated
#   .env.local. Gating it as a required check without secrets would mean a
#   permanently red gate; skipping it on a missing secret would be a silent
#   false-green. Neither is acceptable, so it stays an explicit manual step.
#   PROMOTE to a fail-closed-visible nightly the moment SMTP_* secrets are
#   provisioned — that decision is open, not forgotten.
#
# smoke:send — Class C. Ungated by design: it sends SIX REAL EMAILS through the
#   live IONOS pipeline and refuses to run without an explicit
#   `--confirm-real-send` flag, with manual inbox verification via a printed
#   Run-ID. Automating it on a schedule would add recurring real-mail traffic to
#   the club's live inbox and IONOS rate-limit exposure. Manual validator —
#   correctly not a CI suite.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    name: Node unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: |
          npm run test:lighthouse:unit
          npm run test:blog:unit
          npm run test:seo:unit
          npm run test:sitemap:unit
          npm run test:export:unit
          npm run test:ai-surface:unit
          # Class A, gated 2026-07-19. Pure tsx unit suites, no network, no secrets.
          # Both exit non-zero on failure, so these are real gates, not cosmetic.
          npm run test:search:unit
          # NB smoke:templates is a CRASH-GUARD, not an assertion suite: it renders all
          # three autoresponder templates and prints them, with zero asserts. Green here
          # means "compose*() imports and runs without throwing" — it does NOT verify the
          # rendered copy. Kept honest rather than dressed up as coverage; deepening it
          # into a real assertion suite is out of this work order's scope.
          npm run smoke:templates

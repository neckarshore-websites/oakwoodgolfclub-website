name: Nightly Prod E2E

# Rationale — Pre-Launch Funnel Confidence
#
# Runs the public-form E2E suite against the LIVE Vercel production deploy
# to catch prod-only regressions a local/dev run can't: page reachability,
# form rendering, server-side validation, and the honeypot silent-drop.
#
# SCOPE CHANGE 2026-06-12 (Turnstile went live on all 3 forms): the
# genuine-success submit tests — the only ones that complete a real
# submission and send mail — now self-skip against prod via
# E2E_CAPTCHA_REAL=1, because a real Cloudflare Turnstile token can't be
# solved by a headless browser. CONSEQUENCE: this nightly no longer drives
# a real submit and therefore NO LONGER VERIFIES live IONOS SMTP delivery
# (the original Incident #36 rationale — prod SMTP creds silently breaking
# without a code change). Restoring that coverage WITHOUT driving the
# Turnstile-gated form (e.g. a dedicated server-side SMTP canary) is an
# open decision — see FOR MASCHIN in docs/reports/2026-06-18-linus-fe*.md.
# The happy-path SUBMIT logic itself stays covered by the push-gate
# (`test:e2e:ci`) against dev with Turnstile TEST keys.
#
# Throttle: uses `test:e2e:nightly` (E2E_THROTTLE_MS=10000 — each test
# sleeps 10 s after its assertions) to stay under IONOS's burst limit
# (~16 mails / ~50 s). With the happy-paths now skipped against prod the
# suite sends ~0 mails; the throttle is kept as a cheap safety margin.
#
# Schedule: 01:00 UTC daily = 02:00 CET (winter) / 03:00 CEST (summer).
# Also exposed as workflow_dispatch for manual on-demand runs.
#
# Security note: this workflow takes NO user-controlled input. It runs
# on schedule or manual dispatch only. No issue/PR/comment bodies are
# interpolated into any run step.

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: nightly-prod-e2e
  cancel-in-progress: false

jobs:
  prod-e2e:
    name: Prod E2E against live Vercel deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run nightly E2E against Vercel production
        run: npm run test:e2e:nightly
        env:
          CI: "true"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

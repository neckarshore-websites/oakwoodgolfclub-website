name: Nightly Prod E2E

# Rationale — Pre-Launch Funnel Confidence
#
# The three public forms (Kontakt, Signup, Renewal) talk to IONOS SMTP
# via Vercel Server Actions. Incident #36 (2026-04-18) showed that Prod
# SMTP creds can silently break (password copy-paste artefact in Vercel
# dashboard) without any code change. Local E2E stays green in that
# case — only a run against the live Vercel deploy + live IONOS catches
# the regression.
#
# Running `test:e2e:prod` interactively flakes because IONOS rate-limits
# bursts of ~16 mails / ~50 s. This workflow uses `test:e2e:nightly`
# instead, which sets E2E_THROTTLE_MS=10000 so each test sleeps 10 s
# after its assertions. 23 tests run sequentially, total ~4 min wall
# time — well under IONOS's throttle threshold.
#
# Schedule: 01:00 UTC daily = 02:00 CET (winter) / 03:00 CEST (summer).
# Also exposed as workflow_dispatch for manual on-demand runs.
#
# Notes on IONOS mail volume:
#   - Happy-path tests (3 of 23) actually send mail (~2 mails each =
#     6 real mails per run).
#   - Other tests either short-circuit on validation errors or trigger
#     the honeypot silent-drop, neither of which calls SMTP.
#   - 6 mails/night x 30 nights = ~180 mails/month to the info@-inbox.
#     Acceptable background noise pre-launch; can be redirected to a
#     dedicated smoke-inbox via SMTP_SMOKE_TO later (Backlog #35).
#
# Security note: this workflow takes NO user-controlled input. It runs
# on schedule or manual dispatch only. No issue/PR/comment bodies are
# interpolated into any run step.

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: nightly-prod-e2e
  cancel-in-progress: false

jobs:
  prod-e2e:
    name: Prod E2E against live Vercel deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run nightly E2E against Vercel production
        run: npm run test:e2e:nightly
        env:
          CI: "true"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

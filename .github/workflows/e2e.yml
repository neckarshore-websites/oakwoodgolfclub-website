name: E2E (Playwright)

# Per-PR + push-to-main gate: runs the local Playwright suite (tests/e2e/ —
# the three forms + the B10 legacy-redirect guards) against a dev server.
# Until now the local suite ran only on developer machines and blocked no
# merge (L-TEST-COVERAGE-PACKAGE; ported from neckarshore PR #27).
#
# This is DISTINCT from nightly-prod-e2e.yml: that one runs on a schedule
# against the live Vercel deploy with real Turnstile + real SMTP (IONOS).
# This gate runs locally — `next dev` short-circuits the Server Actions to a
# console.log + ok=true (no SMTP creds), captcha is off (NEXT_PUBLIC_CAPTCHA_
# ENABLED unset → <Turnstile/> renders null), and the per-test reset-rate-limit
# hook works because dev mode keeps NODE_ENV !== "production". Deterministic,
# no third-party hosts, fast.
#
# `test:e2e:ci` = `playwright test --grep-invert @external`. Oakwood's local
# suite has no @external-tagged tests (the prod/real-host run is env-gated via
# E2E_BASE_URL in the nightly workflow, not tag-gated), but the flag keeps the
# family CI contract identical.

on:
  workflow_dispatch:
  push:
    branches: [main]
    # Defensive no-op: the estate stats.json emit (emit-stats job below) targets the
    # UNPROTECTED `stats-data` branch, never main — a push to stats-data never matches
    # this main-only trigger, so the re-emit loop is structurally impossible. Kept so
    # that even a hypothetical manual stats.json commit on main cannot self-trigger.
    paths-ignore:
      - 'stats.json'
  pull_request:
    branches: [main]

# Least-privilege default token — the e2e job only reads the repo. emit-stats re-grants
# contents:write for its job only (job-scoped, never workflow-wide).
permissions:
  contents: read

concurrency:
  # Cancel superseded PR runs; let every push-to-main run complete (each main
  # commit stays gated).
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (excludes @external)
        run: npm run test:e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # Estate stats.json producer (test-scope facet, backlog #391 Lane 3 / Approach E).
  # Publishes a contract-conformant stats.json to the UNPROTECTED `stats-data` branch on
  # every push:main, AFTER the e2e gate. Runs even when e2e fails (if: always) so a non-green
  # run emits red:true — never a stale-green count. contents:write is scoped to THIS job only;
  # publishing to stats-data (not main) keeps main's branch protection fully intact (main is
  # protected: ESLint + Playwright E2E + npm audit required checks) — no bypass actor, no
  # weakened required check. Mirrors the trustscope Approach-E precedent (PR #63).
  #
  # WHAT IS COUNTED: the Playwright e2e suite that THIS job's `e2e` gate runs
  # (`test:e2e:ci` = `--grep-invert @external`), enumerated via `playwright test --list`
  # (the authoritative "Total: N tests" summary — never grep). Both count-set and gate-set
  # are the identical `--grep-invert @external` selection, so the number reflects exactly
  # what CI gates. The repo's Node unit suites (unit.yml: blog/seo/sitemap/export/ai-surface
  # ad-hoc `check()` harnesses + a node:test lighthouse suite) are gated too but print no
  # reporter format any test-stats-action adapter parses (ad-hoc "N passed" summaries /
  # numbered TAP) — so they are deliberately NOT in this emit yet. Capturing them needs a
  # `node:test`/ok-summary adapter in test-stats-action (AP-1, one place), then a one-line
  # runners: addition here. Tracked as a follow-up; the emitted total is an honest e2e floor.
  # Contract: https://github.com/neckarshore-ai/neckarshore-planning/blob/main/docs/reference/stats-json-contract.md
  emit-stats:
    name: Emit stats.json (estate producer)
    needs: e2e
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    concurrency:
      # Serialize emits so two rapid pushes cannot race on the git push to stats-data.
      group: emit-stats-${{ github.ref }}
      cancel-in-progress: false

    steps:
      # Default persist-credentials (true) — the publish step pushes stats.json to the
      # UNPROTECTED stats-data branch via the job's contents:write GITHUB_TOKEN. No branch
      # protection guards stats-data, so this push needs no bypass actor and touches nothing
      # on main.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Enumerate the GATED e2e suite for its count. `--list` collects only (no server, no
      # browser) — it prints the authoritative "Total: N tests in M files" the action parses.
      # The e2e EXECUTION result comes from needs.e2e.result (the gate job above), so this
      # enumeration never re-runs the browser suite. `--grep-invert @external` = the exact
      # selection test:e2e:ci gates, so count-set == gate-set.
      - name: Capture e2e reporter (playwright --list)
        run: npx playwright test --grep-invert @external --list > /tmp/e2e-list.out 2>&1 || true

      # Pinned to the full commit SHA of test-stats-action (third-party actions are SHA-pinned,
      # never tag-floated). 54ae407 is the PIR-passed pin (fixes the 7a53ad0d manifest-load bug)
      # — the same pin md-viewer + trustscope run. declared left empty: no executed-but-ungated
      # suite is counted; the ungated-adapter-less unit suites are simply absent for now.
      - name: Emit stats.json
        uses: neckarshore-ai/test-stats-action@54ae407769bdfea6b8fed2672f0ceefa5ef2588a
        with:
          repo: ${{ github.repository }}
          out: stats.json
          sha: ${{ github.sha }}
          test_result: ${{ needs.e2e.result }}
          runners: |
            e2e:playwright:/tmp/e2e-list.out

      # Structural contract gate — invariants that hold on BOTH green and red runs. Deliberately
      # does NOT assert a golden total (a red run legitimately undercounts and must still emit
      # red:true, so a hard-coded number here would block the honest red emit).
      - name: Validate emitted stats.json against the contract
        run: |
          jq -e --arg repo "$GITHUB_REPOSITORY" '
            .repo == $repo
            and (.audited_sha | type == "string" and length > 0)
            and (.tests.total == ([.tests.byType[]] | add))
            and (.tests.byType | has("e2e"))
            and (.tests.declared == {})
            and (.red | type == "boolean")
          ' stats.json > /dev/null \
            || { echo "::error::stats.json failed contract validation"; cat stats.json; exit 1; }
          echo "stats.json is contract-valid:"; cat stats.json

      # Publish the emitted stats.json to the UNPROTECTED `stats-data` branch (never main —
      # main's protection stays 100% intact). stats-data is a dedicated single-file data branch
      # carrying ONLY stats.json, isolated from main's code history.
      #
      # Built with git PLUMBING (hash-object → mktree → commit-tree → push), NOT a working-tree
      # branch switch. A `git checkout` to stats-data would abort: it shares no history with main,
      # so git treats every main file as "would be overwritten" and refuses. Plumbing never
      # touches the working tree or switches branches — it writes one blob + one tree + one commit
      # to the object DB and pushes the ref. The tree is exactly {stats.json}; the commit chains
      # onto the previous stats-data tip (history preserved) or starts a fresh root (first run).
      #
      # Diff-guard on the meaningful fields only (everything EXCEPT the always-changing updatedAt):
      # a new push has a new audited_sha → publish (keeps the number fresh); a re-run on the same
      # sha differs only by timestamp → no churn commit. The concurrency group serializes the push.
      - name: Publish stats.json to the stats-data branch when it changed
        env:
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"
        run: |
          set -euo pipefail
          norm() { jq -S 'del(.updatedAt)' "$1" 2>/dev/null; }
          # Reliably materialize refs/remotes/origin/stats-data (a bare `fetch <branch>` only sets
          # FETCH_HEAD). Fails harmlessly on the first run (the branch does not exist yet).
          git fetch origin +refs/heads/stats-data:refs/remotes/origin/stats-data 2>/dev/null || true
          if git show origin/stats-data:stats.json > /tmp/prev-stats.json 2>/dev/null \
             && [ "$(norm /tmp/prev-stats.json)" = "$(norm stats.json)" ]; then
            echo "stats.json unchanged (ignoring timestamp) — nothing to publish."
            exit 0
          fi
          BLOB=$(git hash-object -w stats.json)
          TREE=$(printf '100644 blob %s\tstats.json\n' "$BLOB" | git mktree)
          MSG="chore(stats): emit stats.json @ ${GITHUB_SHA:0:7}"
          if git rev-parse --verify origin/stats-data >/dev/null 2>&1; then
            COMMIT=$(git commit-tree "$TREE" -p origin/stats-data -m "$MSG")
          else
            COMMIT=$(git commit-tree "$TREE" -m "$MSG")
          fi
          # Belt: a git push with an EMPTY source refspec (":refs/heads/stats-data") is a DELETE
          # command — an empty $COMMIT would delete stats-data instead of updating it. `set -e`
          # already aborts on a failed commit-tree substitution; this is the explicit guard so a
          # branch deletion can never depend on implicit -e.
          [ -n "$COMMIT" ] || { echo "::error::commit-tree produced no commit — refusing to push (would delete stats-data)"; exit 1; }
          git push origin "${COMMIT}:refs/heads/stats-data"

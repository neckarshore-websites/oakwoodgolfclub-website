name: CodeQL

# Static analysis (SAST) for the deployed application source — JS/TS.
#
# Scope decision (owner build-time call per #270 hardening dispatch §2a):
# the 5 scripts/*.py files are one-off migration / tooling scripts, NOT
# analyzable application source, so `python` is deliberately excluded. Only
# the shipped Next.js JS/TS carries the SAST signal.
#
# `languages:` is PLURAL on codeql-action/init — the singular `language:`
# is silently ignored (frozen-template bug, #270 §3.4).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 07:00 UTC — staggered after lighthouse (06:45).
    - cron: "0 7 * * 1"

# Least-privilege at workflow scope; the analyze job elevates only the
# security-events write it needs to upload results (job-scope, not here).
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write # upload CodeQL results to the Security tab
      actions: read # CodeQL reads workflow run metadata

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:javascript-typescript"

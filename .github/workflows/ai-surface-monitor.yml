name: AI Surface Monitoring

# JK-15 — weekly trend detector across 4 AI providers.
# DORMANT until the 4 API-key secrets are set (see tests/ai-surface/README.md).

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

# Least-privilege: top-level read-only; the single job elevates only the
# writes it actually needs (commit the report + open a regression issue).
permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit + push the weekly AI-surface report
      issues: write # open a regression issue on detected drift
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run AI-surface monitor
        run: npm run test:ai-surface
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/reports/ai-surface/
          git diff --staged --quiet || git commit -m "chore(ai-surface): weekly monitoring report"
          git push

      - name: Open issue on regression
        if: env.HAS_REGRESSION == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('docs/reports/ai-surface/_latest-summary.md', 'utf8');
            const date = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `AI-Surface Regression — ${date}`,
              body,
              labels: ['ai-surface-regression', 'P2'],
            });

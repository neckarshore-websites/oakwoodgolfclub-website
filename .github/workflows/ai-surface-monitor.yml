name: AI Surface Monitoring

# JK-15 — weekly trend detector across 4 AI providers.
# DORMANT until the 4 API-key secrets are set (see tests/ai-surface/README.md).

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run AI-surface monitor
        run: npm run test:ai-surface
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/reports/ai-surface/
          git diff --staged --quiet || git commit -m "chore(ai-surface): weekly monitoring report"
          git push

      - name: Open issue on regression
        if: env.HAS_REGRESSION == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('docs/reports/ai-surface/_latest-summary.md', 'utf8');
            const date = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `AI-Surface Regression — ${date}`,
              body,
              labels: ['ai-surface-regression', 'P2'],
            });
